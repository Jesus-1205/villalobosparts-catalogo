<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTIÓN | {{ company_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Archivo+Black&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --vp-deep: #0D2137;
            --vp-gold: #E8B931;
            --vp-gold-glow: rgba(232, 185, 49, 0.3);
            --vp-surface: #122842;
            --vp-glass: rgba(13, 33, 55, 0.85);
            --vp-border: rgba(255, 255, 255, 0.08);
            --vp-text: #E2E8F0;
            --vp-text-dim: #94A3B8;

            /* Animation variables (emil-design-eng) */
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
            --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
            --duration-fast: 160ms;
            --duration-normal: 200ms;
            --duration-slow: 300ms;

            /* Enhanced glass effects */
            --glass-blur: 20px;
            --glass-border: rgba(232, 185, 49, 0.2);
            --gold-gradient: linear-gradient(135deg, #E8B931 0%, #F5D76E 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--vp-deep);
            background-image: 
                linear-gradient(135deg, rgba(13, 33, 55, 0.95), rgba(18, 40, 66, 0.95)),
                url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23e8b931" fill-opacity="0.05"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM30 31v-1h-1v1h-1v1h-1v1h1v1h1v-1h1v-1h1z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E'),
                /* Industrial grid pattern (frontend-design) */
                linear-gradient(rgba(232, 185, 49, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 185, 49, 0.03) 1px, transparent 1px);
            background-size: auto, auto, 40px 40px, 40px 40px;
            color: var(--vp-text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Radial overlay for depth (frontend-design) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(232, 185, 49, 0.08), transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(13, 33, 55, 0.4), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay (frontend-design) */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E');
            pointer-events: none;
            z-index: 1;
        }

        /* Industrial background image with blur (frontend-design) */
        .bg-industrial {
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml,%3Csvg width="400" height="400" xmlns="http://www.w3.org/2000/svg"%3E%3Cdefs%3E%3Cpattern id="circuit" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"%3E%3Cpath d="M20 0v20M0 20h20M40 20v20M80 20v20M20 40h20M60 40h20M40 60v20M80 60v20M60 80h20M80 80v20" stroke="%23E8B931" stroke-width="0.5" fill="none" opacity="0.3"/%3E%3Ccircle cx="20" cy="20" r="3" fill="none" stroke="%23E8B931" stroke-width="0.5" opacity="0.3"/%3E%3Ccircle cx="80" cy="20" r="3" fill="none" stroke="%23E8B931" stroke-width="0.5" opacity="0.3"/%3E%3Ccircle cx="40" cy="60" r="3" fill="none" stroke="%23E8B931" stroke-width="0.5" opacity="0.3"/%3E%3Ccircle cx="80" cy="80" r="3" fill="none" stroke="%23E8B931" stroke-width="0.5" opacity="0.3"/%3E%3C/pattern%3E%3C/defs%3E%3Crect width="400" height="400" fill="url(%23circuit)"/%3E%3C/svg%3E');
            background-size: 400px 400px;
            filter: blur(8px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        /* Large decorative geometric shapes (frontend-design) */
        .auth-container::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border: 1px solid rgba(232, 185, 49, 0.06);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            pointer-events: none;
            z-index: 0;
        }

        .auth-container::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border: 1px solid rgba(232, 185, 49, 0.04);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        /* Stagger animation for card entrance (emil-design-eng) */
        .auth-card {
            opacity: 0;
            transform: translateY(16px) scale(0.98);
            animation: cardEnter 400ms var(--ease-out) forwards;
            animation-delay: 100ms;
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Stagger children elements */
        .auth-header {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 300ms var(--ease-out) forwards;
            animation-delay: 200ms;
        }

        #error-box {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 300ms ease, transform 300ms var(--ease-out);
        }

        #error-box[data-starting-style] {
            opacity: 0;
            transform: translateY(-8px);
        }

        .form-group:nth-child(1) {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 300ms var(--ease-out) forwards;
            animation-delay: 300ms;
        }

        .form-group:nth-child(2) {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 300ms var(--ease-out) forwards;
            animation-delay: 350ms;
        }

        .btn-submit {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 300ms var(--ease-out) forwards;
            animation-delay: 400ms;
        }

        .auth-footer {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 300ms var(--ease-out) forwards;
            animation-delay: 450ms;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--vp-glass);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 2px; /* Estética industrial: esquinas menos redondeadas */
            padding: 50px 40px;
            position: relative;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(232, 185, 49, 0.05); /* Sutil glow exterior */
        }

        /* Detalle metálico en la parte superior con gradiente mejorado */
        .auth-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold-gradient);
            box-shadow: 0 0 15px rgba(232, 185, 49, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-identifier {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .brand-logo {
            width: 65px;
            height: 65px;
            filter: drop-shadow(0 0 15px var(--vp-gold-glow));
        }

        .brand-name {
            font-family: 'Archivo Black', sans-serif;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: white;
            text-transform: uppercase;
        }

        .brand-name span {
            color: var(--vp-gold);
        }

        .auth-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--vp-text-dim);
            margin-top: 10px;
        }

        /* Estilización de Inputs Industriales */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--vp-gold);
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .input-wrapper {
            position: relative;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--vp-border);
            transition: 
                border-color var(--duration-fast) ease,
                box-shadow var(--duration-fast) ease,
                transform var(--duration-fast) var(--ease-out),
                background var(--duration-fast) ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--vp-gold);
            box-shadow: 0 0 0 3px var(--vp-gold-glow), inset 0 0 20px rgba(232, 185, 49, 0.05);
            background: rgba(0,0,0,0.3);
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--vp-text-dim);
            font-size: 14px;
            transition: 
                opacity var(--duration-fast) ease,
                transform var(--duration-fast) var(--ease-out),
                color var(--duration-fast) ease;
        }

        .input-wrapper:focus-within i {
            color: var(--vp-gold);
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        .form-input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 14px 15px 14px 45px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        /* Botón de Acción Principal */
        .btn-submit {
            width: 100%;
            background: var(--vp-gold);
            color: var(--vp-deep);
            border: none;
            padding: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            cursor: pointer;
            transition: 
                transform var(--duration-fast) var(--ease-out),
                background var(--duration-normal) ease,
                box-shadow var(--duration-normal) ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(232, 185, 49, 0.4);
        }

        .btn-submit:active {
            transform: scale(0.97); /* Feedback inmediato (emil-design-eng) */
        }

        /* Loading state with blur effect (emil-design-eng) */
        .btn-submit.loading {
            position: relative;
            pointer-events: none;
        }

        .btn-submit.loading .btn-text {
            transition: filter 200ms ease, opacity 200ms ease;
        }

        .btn-submit.loading .btn-text.transitioning {
            filter: blur(2px);
            opacity: 0.7;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Manejo de Errores Estilo Alerta */
        .error-container {
            background: rgba(199, 62, 62, 0.1);
            border-left: 3px solid #c73e3e;
            padding: 15px;
            margin-bottom: 25px;
            display: none;
        }

        /* Shake animation with transform (emil-design-eng) */
        .error-container.shake {
            animation: shake 400ms var(--ease-out);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-text {
            color: #ef4444;
            font-size: 13px;
            font-weight: 500;
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
        }

        .link-back {
            color: var(--vp-text-dim);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .link-back:hover {
            color: white;
        }

        /* Decoración de Carga */
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid var(--vp-deep);
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsividad */
        @media (max-width: 480px) {
            .auth-card {
                padding: 40px 25px;
            }
        }

        /* Respect prefers-reduced-motion (emil-design-eng + ui-ux-pro-max) */
        @media (prefers-reduced-motion: reduce) {
            .auth-card,
            .auth-header,
            .form-group,
            .btn-submit,
            .auth-footer {
                animation: none;
                transition: opacity 200ms ease;
            }
            
            .btn-submit:active {
                transform: none;
            }
            
            .btn-submit.loading .btn-text.transitioning {
                filter: none;
            }
        }
    </style>
</head>
<body>

<div class="bg-industrial"></div>

    <div class="auth-container">
<div class="auth-card">
            <header class="auth-header">
                <div class="brand-identifier">
                    <img src="/static/img/logo/logo.svg" alt="Logo" class="brand-logo">
                    <div class="brand-name">{{ company_name|upper }}</div>
                </div>
                <h2 class="auth-title">Terminal de Acceso</h2>
            </header>

            <div id="error-box" class="error-container" style="display: none;">
                <span class="error-text" id="error-msg"></span>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Identificador</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-terminal"></i>
                        <input type="text" id="username" name="username" class="form-input" placeholder="USUARIO" required autofocus autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Código de Acceso</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="password" name="password" class="form-input" placeholder="CONTRASEÑA" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="loader" id="loader"></span>
                    <span id="btn-text">Autenticar</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="/" class="link-back">
                    <i class="fa-solid fa-chevron-left"></i> Retornar al Catálogo
                </a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');
        const btnSubmit = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');
        const loader = document.getElementById('loader');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorBox.style.display = 'none';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('loading');
            btnText.textContent = 'Procesando...';
            btnText.classList.add('transitioning');
            loader.style.display = 'block';

            const rawData = new FormData(loginForm);
            const data = new URLSearchParams(rawData);

          try {
              const response = await fetch('/api/auth/login', {
                method: 'POST',
                body: data,
                headers: {'Content-Type': 'application/x-www-form-urlencoded'}
              });  
              if (!response.ok) {
                const errorData = await response.json();
                const mensaje = Array.isArray(errorData.detail) ? "Error en el formato de los datos " : errorData.detail;
                throw new Error(mensaje);
              }
              const result = await response.json();
              window.location.href = '/dashboard';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorBox.style.display = 'block';
                // Shake animation (emil-design-eng)
                errorBox.classList.remove('shake');
                void errorBox.offsetWidth; // Trigger reflow
                errorBox.classList.add('shake');
            } finally {
                resetButton();
            }
        });

        function resetButton() {
            btnSubmit.disabled = false;
            btnSubmit.classList.remove('loading');
            btnText.classList.remove('transitioning');
            btnText.textContent = 'Autenticar';
            loader.style.display = 'none';
        }
    </script>
</body>
</html>
